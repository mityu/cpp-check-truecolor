name: Build test
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - "*.md"
      - LICENSE
      - compile_flags.txt
      - .clang-format
      - .gitignore
  pull_request:
    paths-ignore:
      - "*.md"
      - LICENSE
      - compile_flags.txt
      - .clang-format
      - .gitignore

permissions:
  contents: read

jobs:
  build-test:
    name: On ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Show environment
        run: |
          uname -a
          if type g++ > /dev/null; then
            g++ --version
          fi
          if type clang++ > /dev/null; then
            clang++ --version
          fi
      - run: make
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
      - name: Run tests
        run: |
          deno --version
          make test

  build-test-with-nix:
    name: On ${{ matrix.os }} with Nix
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
      - run: nix build .
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
      - name: Run tests
        run: |
          deno --version
          CHECK_TRUECOLOR_EXECUTABLE="$(pwd)/result/bin/check-truecolor" make test
